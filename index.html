	<!DOCTYPE html>
	<html lang="zh-CN">
	<head>
	    <meta charset="UTF-8">
	    <title>PDF与音频展示页</title>
	    <style>
	        body {
	            font-family: Arial, sans-serif;
	            margin: 20px;
	            background-color: #f4f4f9;
	            color: #333;
	        }
	        .container {
	            max-width: 900px;
	            margin: 0 auto;
	            background: white;
	            padding: 20px;
	            border-radius: 8px;
	            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
	        }
	        h1 {
	            text-align: center;
	        }
	        .section {
	            margin-bottom: 30px;
	        }
	        /* PDF展示区域样式 */
	        .pdf-viewer {
	            width: 100%;
	            height: 600px; /* 根据需要调整高度 */
	            border: 1px solid #ccc;
	        }
	        /* 音频播放区域样式 */
	        .audio-player {
	            width: 100%;
	            margin-top: 10px;
	        }
	    </style>
	</head>
	<body>
	    <div class="container">
	        <h1>文档与音频展示</h1>
	        <!-- 需求1：展示PDF -->
	        <div class="section">
	            <h2>PDF文档预览</h2>
	            <!-- 请将 src 中的 "yourfile.pdf" 替换为您实际的PDF文件路径 -->
	            <iframe src="./血小板活化-转移性前列腺癌的病程分析与思考.pdf" class="pdf-viewer">
	                您的浏览器不支持PDF预览，请<a href="血小板活化-转移性前列腺癌的病程分析与思考.pdf">点击此处下载</a>查看。
	            </iframe>
	        </div>
	        <!-- 需求2：手动播放音频 -->
	        <div class="section">
	            <h2>音频播放</h2>
	            <!-- controls 属性会显示播放/暂停等手动控制按钮 -->
	            <!-- 请将 src 中的 "音频.mp3" 替换为您实际的音频文件路径 -->
	            <audio controls class="audio-player">
	                <source src="音频.mp3" type="audio/mpeg">
	                您的浏览器不支持音频播放。
	            </audio>
	        </div>
	    </div>
	</body>
	</html>
